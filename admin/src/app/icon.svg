<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="sky" cx="38%" cy="34%" r="72%">
            <stop offset="0%" stop-color="#8B6CF0" />
            <stop offset="55%" stop-color="#5B54D6" />
            <stop offset="100%" stop-color="#2B2660" />
        </radialGradient>
        <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FFD24D" />
            <stop offset="100%" stop-color="#FF7AA8" />
        </linearGradient>
    </defs>
    <!-- 宇宙圆盘 -->
    <circle cx="32" cy="32" r="30" fill="url(#sky)" />
    <!-- 星点 -->
    <circle cx="20" cy="18" r="1.6" fill="#fff" />
    <circle cx="44" cy="16" r="1.2" fill="#FFE7A3" />
    <circle cx="15" cy="40" r="1.2" fill="#fff" />
    <circle cx="49" cy="44" r="1.6" fill="#BFD4FF" />
    <circle cx="38" cy="49" r="1" fill="#fff" />
    <!-- 轨道环（时空） -->
    <ellipse cx="32" cy="32" rx="26" ry="10.5" fill="none" stroke="url(#ring)" stroke-width="3"
        transform="rotate(-28 32 32)" />
    <!-- 时之核心 -->
    <circle cx="32" cy="32" r="9.5" fill="#FFD24D" />
    <!-- 指针（时间） -->
    <path d="M32 32 L32 26" stroke="#7A4E00" stroke-width="2.4" stroke-linecap="round" />
    <path d="M32 32 L36.5 34" stroke="#7A4E00" stroke-width="2.4" stroke-linecap="round" />
    <circle cx="32" cy="32" r="1.8" fill="#7A4E00" />
</svg>